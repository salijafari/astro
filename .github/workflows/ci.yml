name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-coach-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: astro-coach-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-coach-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: astro-coach-api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
